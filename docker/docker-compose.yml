name: lite-ats

services:
  app:
    build:
      args:
        APP_PORT: ${APP_PORT:-3001}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:?Set VITE_TURNSTILE_SITE_KEY in the Compose environment file}
      context: ..
      dockerfile: docker/Dockerfile
    image: lite-ats:local
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      APP_STATIC_DIRECTORY: /app/dist
      LOCAL_ADMIN_EMAIL: ${LOCAL_ADMIN_EMAIL:-admin@example.com}
      LOCAL_ADMIN_NAME: ${LOCAL_ADMIN_NAME:-Local Admin}
      LOCAL_ADMIN_PASSWORD: ${LOCAL_ADMIN_PASSWORD:-password123}
      MINIO_BUCKET: ${MINIO_BUCKET:-resumes}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_USE_SSL: "false"
      RESUME_API_HOST: 0.0.0.0
      RESUME_API_PORT: ${APP_PORT:-3001}
      RESUME_API_PUBLIC_URL: ${RESUME_API_PUBLIC_URL:-}
      RESUME_DATABASE_PATH: /app/server/.data/resumes.sqlite
      RESUME_SHARE_TTL_MINUTES: ${RESUME_SHARE_TTL_MINUTES:-60}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:?Set TURNSTILE_SECRET_KEY in the Compose environment file}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:'+process.env.RESUME_API_PORT+'/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${APP_PORT:-3001}:${APP_PORT:-3001}"
    volumes:
      - lite-ats-data:/app/server/.data

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
    healthcheck:
      test: [CMD, curl, -f, http://localhost:9000/minio/health/live]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - ${MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
      - minio-data:/data

volumes:
  lite-ats-data:
  minio-data:
